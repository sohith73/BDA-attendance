<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BDA Attendance</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ==================== Setup Screen - Step 1: Email ==================== -->
  <div id="setup-screen" class="setup-container" style="display: none;">
    <div class="setup-brand">
      <img src="icons/icon128.png" alt="FlashFire" class="logo">
      <h1>BDA Attendance</h1>
      <p>Track your meeting attendance automatically</p>
    </div>

    <form id="email-form" class="setup-form">
      <div class="form-group">
        <label for="bda-email">Your Email</label>
        <div class="input-with-icon">
          <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
            <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
            <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
          </svg>
          <input type="email" id="bda-email" placeholder="name@flashfirejobs.com" required autocomplete="email">
        </div>
      </div>
      <button type="submit" id="email-btn" class="btn-primary">
        Send OTP
      </button>
      <div id="email-info" class="form-info" style="display: none;"></div>
      <div id="email-error" class="form-error" style="display: none;"></div>
    </form>
  </div>

  <!-- ==================== Setup Screen - Step 2: OTP ==================== -->
  <div id="otp-screen" class="setup-container" style="display: none;">
    <div class="setup-brand">
      <img src="icons/icon128.png" alt="FlashFire" class="logo">
      <h1>Enter OTP</h1>
      <p>We sent a 6-digit code to</p>
      <p class="otp-email-display" id="otp-email-display">email@example.com</p>
    </div>

    <form id="otp-form" class="setup-form">
      <div class="form-group">
        <label for="otp-input">One-Time Password</label>
        <input type="text" id="otp-input" placeholder="- - - - - -" required maxlength="6" inputmode="numeric" pattern="\d{6}" autocomplete="one-time-code">
      </div>
      <button type="submit" id="otp-btn" class="btn-primary" disabled>
        Verify & Login
      </button>
      <div id="otp-error" class="form-error" style="display: none;"></div>
      <div class="otp-actions">
        <button type="button" id="change-email-btn" class="btn-link">Change email</button>
        <button type="button" id="resend-otp-btn" class="btn-link">Resend OTP</button>
      </div>
    </form>
  </div>

  <!-- ==================== Setup Screen - Step 3: Name ==================== -->
  <div id="name-screen" class="setup-container" style="display: none;">
    <div class="setup-brand">
      <img src="icons/icon128.png" alt="FlashFire" class="logo">
      <h1>Welcome!</h1>
      <p>Please enter your display name</p>
    </div>

    <form id="name-form" class="setup-form">
      <div class="form-group">
        <label for="bda-name-input">Your Name</label>
        <input type="text" id="bda-name-input" placeholder="e.g., Sohith Kumar" required minlength="2" maxlength="100">
      </div>
      <button type="submit" id="name-btn" class="btn-primary">
        Continue
      </button>
      <div id="name-error" class="form-error" style="display: none;"></div>
    </form>
  </div>

  <!-- ==================== Dashboard ==================== -->
  <div id="dashboard-screen" class="dashboard-container" style="display: none;">
    <!-- Header -->
    <div class="dashboard-header">
      <div class="header-avatar" id="bda-avatar">BD</div>
      <div class="header-info">
        <h2 id="bda-display-name">BDA Name</h2>
        <p id="bda-display-email">email@example.com</p>
      </div>
      <button id="quick-mark-btn" class="btn-quickmark" title="Mark present for the live meeting">
        <img src="icons/icon48.png" alt="FlashFire" />
      </button>
      <button id="logout-btn" class="btn-logout" title="Logout">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div class="dashboard-body">
      <!-- Upcoming Meetings -->
      <div class="section">
        <div class="section-title">Upcoming Meetings</div>
        <div id="upcoming-meetings">
          <div class="loading-shimmer"></div>
          <div class="loading-shimmer"></div>
        </div>
      </div>

      <!-- Current / Last Meeting -->
      <div class="section">
        <div class="section-title">Current / Last Meeting</div>
        <div id="previous-meetings">
          <div class="loading-shimmer"></div>
        </div>
      </div>

      <!-- Event Log -->
      <div class="section">
        <div class="section-title">Activity Log</div>
        <div class="event-log">
          <div id="event-log-list" class="event-log-list">
            <div class="empty-state" id="event-empty">
              <p>No activity yet</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Quick-mark / info toast -->
    <div id="quick-toast" class="quick-toast" role="status" aria-live="polite"></div>

    <!-- Connection Bar -->
    <div class="connection-bar">
      <div>
        <span id="connection-dot" class="connection-dot connecting"></span>
        <span id="connection-status">Connecting...</span>
      </div>
      <button id="refresh-btn" class="refresh-btn">Refresh</button>
    </div>
  </div>

  <script src="panel.js" type="module"></script>
</body>
</html>
